<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAT 寫作議題 | 聖誕寫作樹</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        /* 保持原有的 CSS 樣式不變 */
        :root {
            --primary-color: #ffd700;
            --secondary-color: #1e3a5f;
            --accent-color: #0f5132;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #1e3a5f 0%, #0f1b3a 70%, #0a1428 100%);
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .snowflake {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        
        .tree {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(400px, 40vw);
            height: min(500px, 50vh);
            background: radial-gradient(circle at 50% 0%, #0f5132 30%, #0a3d1f 100%);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.7;
            z-index: 1;
        }
        
        .star {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: min(50px, 8vw);
            height: min(50px, 8vw);
            background: radial-gradient(circle, #ffdd00, #ffaa00);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 0 40px #ffd700;
            animation: twinkle 2s infinite;
            z-index: 5;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        #container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: min(60px, 10vh);
            z-index: 2;
        }
        
        .center {
            position: sticky;
            top: 20px;
            width: min(160px, 35vw);
            height: min(160px, 35vw);
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffd700, inset 0 0 30px rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(13px, 3vw, 18px);
            font-weight: bold;
            text-shadow: 0 0 10px #000;
            z-index: 20;
            flex-shrink: 0;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .center:hover {
            transform: scale(1.05);
            box-shadow: 0 0 100px #ffd700, inset 0 0 50px rgba(255, 255, 255, 0.8);
        }
        
        .center span {
            font-size: clamp(10px, 2.5vw, 14px);
            margin-top: 5px;
        }
        
        .topics-wrapper {
            position: relative;
            width: min(600px, 90vw);
            height: min(600px, 90vw);
            margin: 20px auto;
            overflow: visible;
        }
        
        .topic {
            position: absolute;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.4), 0 0 25px rgba(255, 215, 0, 0.7);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 7s ease-in-out infinite, shine 5s infinite;
            padding: 4px;
            box-sizing: border-box;
            z-index: 8;
            text-align: center;
            overflow: hidden;
            transform-origin: center;
        }
        
        .topic:hover {
            transform: scale(1.25) !important;
            z-index: 30;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.6), 0 0 45px rgba(255, 215, 0, 1);
        }
        
        .topic .zh {
            font-size: clamp(8px, 1.2vw, 11px);
            line-height: 1.2;
            margin-bottom: 1px;
        }
        
        .topic .en {
            font-size: clamp(6px, 0.9vw, 9px);
            opacity: 0.95;
            line-height: 1.1;
        }
        
        /* 顏色類別 */
        .c1 { background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b); }
        .c2 { background: radial-gradient(circle at 30% 30%, #f1c40f, #e67e22); }
        .c3 { background: radial-gradient(circle at 30% 30%, #27ae60, #1e8449); }
        .c4 { background: radial-gradient(circle at 30% 30%, #3498db, #2980b9); }
        .c5 { background: radial-gradient(circle at 30% 30%, #9b59b6, #8e44ad); }
        .c6 { background: radial-gradient(circle at 30% 30%, #e91e63, #c2185b); }
        .c7 { background: radial-gradient(circle at 30% 30%, #ff9800, #f57c00); }
        .c8 { background: radial-gradient(circle at 30% 30%, #00bcd4, #0097a7); }
        .c9 { background: radial-gradient(circle at 30% 30%, #e67e22, #d35400); }
        .c10 { background: radial-gradient(circle at 30% 30%, #95a5a6, #7f8c8d); }
        .c11 { background: radial-gradient(circle at 30% 30%, #f39c12, #e67e22); }
        .c12 { background: radial-gradient(circle at 30% 30%, #c0392b, #a93226); }
        .c13 { background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60); }
        .c14 { background: radial-gradient(circle at 30% 30%, #8e44ad, #71368a); }
        .c15 { background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b); }
        .c16 { background: radial-gradient(circle at 30% 30%, #16a085, #117a65); }
        .c17 { background: radial-gradient(circle at 30% 30%, #f1c40f, #f39c12); }
        .c18 { background: radial-gradient(circle at 30% 30%, #3498db, #2980b9); }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
        
        @keyframes shine {
            0%, 100% { box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.4), 0 0 25px rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 215, 0, 1); }
        }
        
        .line {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #ffd700, transparent);
            box-shadow: 0 0 12px #ffd700;
            transform-origin: top left;
            animation: twinkle 3s infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        #sentences {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 36, 57, 0.98);
            padding: min(40px, 4vw);
            border-radius: 25px;
            max-width: min(950px, 90vw);
            width: 92%;
            max-height: 92vh;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.8);
            border: 3px solid #ffd700;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        #sentences.show {
            opacity: 1;
        }
        
        .close {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 40px;
            cursor: pointer;
            color: #ffd700;
            transition: transform 0.3s;
        }
        
        .close:hover {
            transform: scale(1.2);
        }
        
        .sentence {
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            line-height: 1.8;
            backdrop-filter: blur(8px);
            border-left: 6px solid #ffd700;
            font-size: clamp(16px, 2.5vw, 18px);
            transition: transform 0.3s, background 0.3s;
        }
        
        .sentence:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.18);
        }
        
        .vocab {
            background: rgba(255, 215, 0, 0.25);
            padding: 3px 7px;
            border-radius: 6px;
            cursor: pointer;
            border-bottom: 2px solid #ffd700;
            position: relative;
            transition: all 0.3s;
        }
        
        .vocab:hover {
            background: rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .vocab:hover::after {
            content: attr(data-trans) "（" attr(data-pron) "）";
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            color: #ffd700;
            padding: 8px 14px;
            border-radius: 8px;
            white-space: nowrap;
            font-size: 15px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
        }
        
        .play-btn {
            margin-left: 18px;
            cursor: pointer;
            font-size: clamp(20px, 4vw, 28px);
            transition: transform 0.3s;
            display: inline-block;
        }
        
        .play-btn:hover {
            transform: scale(1.2);
        }
        
        /* 新增互動元素 */
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.5);
            z-index: 5;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .lights-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 215, 0, 0.2);
            color: white;
            border: 1px solid rgba(255, 215, 0, 0.5);
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .lights-toggle:hover {
            background: rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }
        
        /* 響應式設計 */
        @media (max-width: 1000px) {
            .topics-wrapper {
                width: min(500px, 85vw);
                height: min(500px, 85vw);
            }
        }
        
        @media (max-width: 768px) {
            .center {
                width: min(120px, 40vw);
                height: min(120px, 40vw);
            }
            .instructions {
                width: 90%;
                font-size: 11px;
            }
        }
        
        @media (max-width: 480px) {
            .sentence {
                padding: 12px;
                margin: 10px 0;
            }
            .lights-toggle {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="snow"></div>
    <div class="tree"></div>
    <div class="star"></div>
    
    <button class="lights-toggle" id="lightsToggle">✨ 切換燈光效果</button>

    <div id="container">
        <div class="center" id="centerCircle">
            GSAT 寫作議題
            <span>Writing Topics</span>
        </div>
        <div class="topics-wrapper" id="topicsWrapper"></div>
    </div>

    <div class="instructions">點擊彩燈查看寫作範例 • 點擊單字查看翻譯 • 點擊喇叭聽發音</div>

    <div id="sentences">
        <span class="close">×</span>
        <h2 id="topic-title" style="text-align:center;color:#ffd700;margin-bottom:30px;"></h2>
        <div id="sentence-list"></div>
    </div>

    <script>
        // 飄雪效果
        const snowContainer = document.querySelector('.snow');
        function createSnowflake() {
            const s = document.createElement('div');
            s.classList.add('snowflake');
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = Math.random() * 5 + 5 + 's';
            s.style.opacity = Math.random() * 0.5 + 0.5;
            s.style.width = s.style.height = Math.random() * 8 + 5 + 'px';
            snowContainer.appendChild(s);
            setTimeout(() => s.remove(), 10000);
        }
        setInterval(createSnowflake, 800);

        const csvUrl = "https://raw.githubusercontent.com/DuCJ-creator/Shirley-AI-Writing/main/idea%20bank/topic%20writing%20ideas.csv";
        let data = [];
        const colors = ['c1','c2','c3','c4','c5','c6','c7','c8','c9','c10','c11','c12','c13','c14','c15','c16','c17','c18'];

        // 高階單字庫
        const vocabDict = {
            "equality":["平等","ɪˈkwɑːləti"],"fundamental":["基本的","ˌfʌndəˈmentl"],"despite":["儘管","dɪˈspaɪt"],"discriminatory":["歧視性的","dɪsˈkrɪmɪnətɔːri"],
            "pervasive":["普遍的","pɜːrˈveɪsɪv"],"underrepresented":["代表性不足的","ˌʌndərreprɪˈzentɪd"],"parity":["平等","ˈpærəti"],"inroads":["進展","ˈɪnroʊdz"],
            "sustainable":["永續的","səˈsteɪnəbl"],"biodiversity":["生物多樣性","ˌbaɪoʊdaɪˈvɜːrsəti"],"renewable":["可再生的","rɪˈnuːəbl"],"mitigate":["減緩","ˈmɪtɪɡeɪt"],
            "ecosystem":["生態系統","ˈiːkoʊsɪstəm"],"conservation":["保育","ˌkɑːnsərˈveɪʃn"],"degradation":["退化","ˌdeɡrəˈdeɪʃn"],"resilience":["韌性","rɪˈzɪliəns"],
            "empower":["賦權","ɪmˈpaʊər"],"holistic":["整體的","hoʊˈlɪstɪk"],"intercultural":["跨文化的","ˌɪntərˈkʌltʃərəl"],"inherent":["固有的","ɪnˈhɪrənt"],
            "advocate":["倡導","ˈædvəkeɪt"],"proactive":["主動的","proʊˈæktɪv"],"stewardship":["管理責任","ˈstuːərdʃɪp"],"imperative":["必要的","ɪmˈperətɪv"],
            "prevalent":["普遍的","ˈprevələnt"],"dignity":["尊嚴","ˈdɪɡnəti"],"entitled":["有權利的","ɪnˈtaɪtld"],"transmit":["傳遞","trænsˈmɪt"],
            "nurture":["培養","ˈnɜːrtʃər"],"curiosity":["好奇心","ˌkjʊriˈɑːsəti"],"lifelong":["終身的","ˈlaɪflɔːŋ"],"assess":["評估","əˈses"],
            "trajectory":["軌跡","trəˈdʒektəri"],"mentorship":["導師制","ˈmentɔːrʃɪp"],"diversity":["多樣性","dɪˈvɜːrsəti"],"inclusivity":["包容性","ˌɪnkluːˈsɪvɪti"],
            "reconciliation":["和解","ˌrekənsɪliˈeɪʃn"],"heritage":["遺產","ˈherɪtɪdʒ"],"indigenous":["原住民的","ɪnˈdɪdʒənəs"],"preservation":["保存","ˌprezərˈveɪʃn"],
            "ethical":["倫理的","ˈeθɪkl"],"integrity":["誠信","ɪnˈteɡrəti"],"compassion":["同情","kəmˈpæʃn"],"altruism":["利他","ˈæltruɪzəm"],
            "resilient":["有韌性的","rɪˈzɪliənt"],"navigate":["應對","ˈnævɪɡeɪt"],"interconnectedness":["相互連結","ˌɪntərkəˈnektɪdnəs"],"empathy":["同理心","ˈempəθi"],
            "transcend":["超越","trænˈsend"],"cohesion":["凝聚","koʊˈhiːʒn"],"equitable":["公平的","ˈekwɪtəbl"],"governance":["治理","ˈɡʌvərnəns"],
            "accountability":["問責","əˌkaʊntəˈbɪləti"],"impartial":["公正的","ɪmˈpɑːrʃl"],"transparency":["透明","trænsˈpærənsi"],"arbitrary":["任意的","ˈɑːrbətreri"],
            "legitimacy":["正當性","lɪˈdʒɪtɪməsi"],"vigilance":["警覺","ˈvɪdʒɪləns"],"profound":["深刻的","prəˈfaʊnd"],"catastrophic":["災難性的","ˌkætəˈstrɑːfɪk"],
            "vulnerable":["脆弱的","ˈvʌlnərəbl"],"mitigation":["緩解","ˌmɪtɪˈɡeɪʃn"],"evacuation":["疏散","ɪˌvækjuˈeɪʃn"],"preparedness":["準備","prɪˈperdnəs"],
            "literacy":["素養","ˈlɪtərəsi"],"empowerment":["賦權","ɪmˈpaʊərmənt"],"inclusive":["包容的","ɪnˈkluːsɪv"],"facilitate":["促進","fəˈsɪlɪteɪt"],
            "immersive":["沉浸式的","ɪˈmɜːrsɪv"],"globalization":["全球化","ˌɡloʊbələˈzeɪʃn"],"citizenship":["公民身份","ˈsɪtɪzənʃɪp"],
            "tolerance":["寬容","ˈtɑːlərəns"],"solidarity":["團結","ˌsɑːlɪˈdærəti"]
        };

        // 載入 CSV 資料 - 修正資料處理
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(r) {
                console.log("原始 CSV 資料:", r.data); // 除錯用
                
                // 過濾並處理資料
                data = r.data
                    .filter(x => x.category && x['model sentence'])
                    .map(item => {
                        let sentence = item['model sentence'].trim();
                        
                        // 檢查句子是否被截斷（包含換行或非常短）
                        if (sentence.includes('\n') || sentence.split(' ').length < 3) {
                            console.warn('可能被截斷的句子:', sentence);
                            return null; // 跳過被截斷的句子
                        }
                        
                        // 確保句子開頭大寫
                        if (sentence.length > 0) {
                            sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1);
                        }
                        
                        // 確保句子有適當的結束標點
                        if (!sentence.endsWith('.') && !sentence.endsWith('!') && !sentence.endsWith('?')) {
                            sentence += '.';
                        }
                        
                        item['model sentence'] = sentence;
                        return item;
                    })
                    .filter(x => x !== null);
                
                console.log("處理後的資料:", data); // 除錯用
                
                const topics = [...new Set(data.map(x => x.category.trim()))];
                renderTopics(topics);
            },
            error: function(err) {
                console.error('CSV 載入錯誤:', err);
                // 如果載入失敗，使用備用資料
                useFallbackData();
            }
        });

        // 備用資料 (完整18個主題)
        function useFallbackData() {
            const fallbackData = [
                { category: "教育平等 Education Equality", "model sentence": "Education equality ensures that every student has access to quality learning opportunities regardless of their background." },

                { category: "環境保護 Environmental Protection", "model sentence": "Environmental protection requires collective efforts to preserve natural resources for future generations." },
                { category: "環境保護 Environmental Protection", "model sentence": "Sustainable practices such as recycling and renewable energy use are essential to mitigate ecosystem degradation." },
                { category: "科技發展 Technology Development", "model sentence": "Technology development has revolutionized the way we communicate and access information in modern society." },
                { category: "科技發展 Technology Development", "model sentence": "Proactive investment in digital literacy empowers citizens to navigate the challenges of rapid technological change." },
                { category: "性別平等 Gender Equality", "model sentence": "Gender equality is a fundamental right, yet discriminatory barriers remain pervasive in many workplaces worldwide." },
                { category: "性別平等 Gender Equality", "model sentence": "Advocating for equal pay and leadership opportunities allows women to make significant inroads in every sector." },
                { category: "文化多樣性 Cultural Diversity", "model sentence": "Cultural diversity enriches society by fostering intercultural understanding, tolerance, and solidarity among communities." },
                { category: "文化多樣性 Cultural Diversity", "model sentence": "Preserving indigenous heritage and languages is an inherent responsibility of any inclusive and equitable governance system." },
                { category: "心理健康 Mental Health", "model sentence": "Mental health literacy and compassionate support systems are imperative for building a resilient society." },
                { category: "心理健康 Mental Health", "model sentence": "Holistic approaches to wellbeing empower individuals to navigate adversity with greater empathy and resilience." },
                { category: "全球化 Globalization", "model sentence": "Globalization transcends borders, creating interconnectedness that demands both equitable governance and shared accountability." },
                { category: "全球化 Globalization", "model sentence": "The cohesion of global citizenship depends on impartial institutions that uphold transparency and legitimacy." },
                { category: "氣候變遷 Climate Change", "model sentence": "Climate change poses catastrophic risks to vulnerable populations, making mitigation and preparedness strategies urgent imperatives." },
                { category: "氣候變遷 Climate Change", "model sentence": "Collective stewardship of the environment requires profound vigilance and a commitment to sustainable ecosystems." },
                { category: "社會正義 Social Justice", "model sentence": "Social justice advocates for equitable treatment and dignity for all, challenging arbitrary systems of discrimination." },
                { category: "社會正義 Social Justice", "model sentence": "Empowerment through inclusive policies facilitates reconciliation and strengthens the resilience of marginalized communities." },
                { category: "媒體識讀 Media Literacy", "model sentence": "Media literacy enables citizens to critically assess information sources, combating the prevalent spread of misinformation." },
                { category: "媒體識讀 Media Literacy", "model sentence": "An informed and vigilant public is essential to maintaining the integrity and accountability of democratic institutions." },
                { category: "志工服務 Volunteer Service", "model sentence": "Volunteer service cultivates altruism and empathy, nurturing a lifelong commitment to community stewardship." },
                { category: "志工服務 Volunteer Service", "model sentence": "Through mentorship and proactive engagement, volunteers facilitate the inclusivity and cohesion of diverse communities." },
                { category: "飲食文化 Food Culture", "model sentence": "Food culture is a profound expression of heritage and identity, transmitting values across generations." },
                { category: "飲食文化 Food Culture", "model sentence": "Sustainable food systems that prioritize biodiversity and conservation are fundamental to human and ecological resilience." },
                { category: "運動精神 Sportsmanship", "model sentence": "Sportsmanship embodies integrity, compassion, and solidarity, transcending competition to unite people across cultures." },
                { category: "運動精神 Sportsmanship", "model sentence": "Athletes who model equitable and inclusive conduct empower the next generation with enduring values of dignity." },
                { category: "人工智慧 Artificial Intelligence", "model sentence": "Artificial intelligence development demands ethical governance frameworks to ensure accountability and transparency in its applications." },
                { category: "人工智慧 Artificial Intelligence", "model sentence": "Immersive AI tools facilitate personalized learning trajectories, empowering students with curiosity-driven, lifelong education." },
                { category: "閱讀素養 Reading Literacy", "model sentence": "Reading literacy is the foundation of lifelong learning, nurturing curiosity and the capacity to assess complex ideas." },
                { category: "閱讀素養 Reading Literacy", "model sentence": "Inclusive access to diverse texts empowers underrepresented voices and strengthens intercultural solidarity in education." },
                { category: "都市發展 Urban Development", "model sentence": "Sustainable urban development requires holistic planning that balances resilience, inclusivity, and environmental conservation." },
                { category: "都市發展 Urban Development", "model sentence": "Equitable urban governance ensures that all citizens, regardless of background, have access to essential resources and dignity." },
                { category: "原住民文化 Indigenous Culture", "model sentence": "Preserving indigenous culture and heritage is a fundamental act of reconciliation and respect for human diversity." },
                { category: "原住民文化 Indigenous Culture", "model sentence": "Indigenous stewardship of land and ecosystems embodies a profound, holistic understanding of sustainable conservation." },
                { category: "道德教育 Moral Education", "model sentence": "Moral education nurtures integrity, compassion, and altruism, empowering students to navigate ethical dilemmas with resilience." },
                { category: "道德教育 Moral Education", "model sentence": "Cultivating ethical citizenship through education facilitates a more equitable and cohesive society for future generations." }
            ];
            
            data = fallbackData;
            const topics = [...new Set(data.map(x => x.category.trim()))];
            renderTopics(topics);
        }

        // 渲染主題圓圈
        function renderTopics(topics) {
            const wrapper = document.getElementById('topicsWrapper');

            // Use viewport-relative sizing so all bulbs always fit
            const vw = Math.min(window.innerWidth, 700);
            const bulbR = Math.min(36, vw * 0.052);   // half of bulb width (~72px max diameter)
            const innerRadius = Math.min(130, vw * 0.19);
            const outerRadius = Math.min(215, vw * 0.30);

            // Split topics into two rings
            const innerCount = Math.min(9, Math.ceil(topics.length / 2));
            const outerCount = topics.length - innerCount;

            // Size wrapper to fit outerRadius + bulb + padding
            const needed = (outerRadius + bulbR + 20) * 2;
            wrapper.style.width = needed + 'px';
            wrapper.style.height = needed + 'px';
            wrapper.style.maxWidth = '90vw';

            topics.forEach((n, i) => {
                const isInner = i < innerCount;
                const ringTotal = isInner ? innerCount : outerCount;
                const ringIndex = isInner ? i : i - innerCount;
                const radius = isInner ? innerRadius : outerRadius;
                const angle = (ringIndex / ringTotal) * 2 * Math.PI - Math.PI / 2;

                const div = document.createElement('div');
                div.className = `topic ${colors[i % colors.length]}`;
                div.style.left = `calc(50% + ${radius * Math.cos(angle)}px - ${bulbR}px)`;
                div.style.top = `calc(50% + ${radius * Math.sin(angle)}px - ${bulbR}px)`;
                div.style.width = (bulbR * 2) + 'px';
                div.style.height = (bulbR * 2) + 'px';
                div.style.animationDelay = i * 0.2 + 's';
                const zh = n.split(' ')[0];
                const en = n.split(' ').slice(1).join(' ');
                div.innerHTML = `<div class="zh">${zh}</div><div class="en">${en}</div>`;
                div.onclick = () => showSentences(n);
                wrapper.appendChild(div);

                // 添加連接線
                const line = document.createElement('div');
                line.className = 'line';
                line.style.width = `${radius}px`;
                line.style.left = '50%';
                line.style.top = '50%';
                line.style.transform = `rotate(${angle * 180 / Math.PI}deg)`;
                line.style.transformOrigin = '0 0';
                wrapper.appendChild(line);
            });
        }

        // 顯示句子 - 加強句子檢查
        function showSentences(topic) {
            const rows = data.filter(r => r.category.trim() === topic);
            
            console.log(`主題 "${topic}" 的句子:`, rows); // 除錯用
            
            if (rows.length === 0) {
                alert('找不到這個主題的完整句子，請檢查 CSV 檔案格式。');
                return;
            }

            // 隨機選擇2個完整的句子
            const selected = rows.sort(() => 0.5 - Math.random()).slice(0, 2);

            document.getElementById('topic-title').textContent = topic;
            const list = document.getElementById('sentence-list');
            list.innerHTML = '';

            selected.forEach(item => {
                let sent = item['model sentence'].trim();

                // 最終檢查和清理
                if (sent) {
                    // 移除所有換行符和多餘空格
                    sent = sent.replace(/[\n\r]/g, ' ').replace(/\s+/g, ' ').trim();
                    
                    // 強制句首大寫
                    sent = sent.charAt(0).toUpperCase() + sent.slice(1);
                    
                    // 確保句子以句號結束
                    if (!sent.endsWith('.') && !sent.endsWith('!') && !sent.endsWith('?')) {
                        sent += '.';
                    }
                    
                    // 檢查句子長度
                    if (sent.split(' ').length < 4) {
                        console.warn('句子太短，可能不完整:', sent);
                        return; // 跳過太短的句子
                    }
                }

                sent = highlightVocab(sent);
                const div = document.createElement('div');
                div.className = 'sentence';
                div.innerHTML = `<span>${sent}</span><span class="play-btn" onclick="speak(this.previousElementSibling.textContent)">🔊</span>`;
                list.appendChild(div);
            });

            const sentencesDiv = document.getElementById('sentences');
            sentencesDiv.style.display = 'block';
            setTimeout(() => {
                sentencesDiv.classList.add('show');
            }, 10);
        }

        // 高亮單字
        function highlightVocab(text) {
            let result = text;
            Object.keys(vocabDict).forEach(w => {
                const regex = new RegExp(`\\b${w}\\b`, 'gi');
                result = result.replace(regex, `<span class="vocab" data-trans="${vocabDict[w][0]}" data-pron="${vocabDict[w][1]}">${w}</span>`);
            });
            return result;
        }

        // 語音功能
        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.85;
            speechSynthesis.speak(utter);
        }

        // 關閉句子視窗
        document.querySelector('.close').onclick = () => {
            const sentencesDiv = document.getElementById('sentences');
            sentencesDiv.classList.remove('show');
            setTimeout(() => {
                sentencesDiv.style.display = 'none';
            }, 300);
        };

        // 點擊背景關閉句子視窗
        document.getElementById('sentences').addEventListener('click', (e) => {
            if (e.target === document.getElementById('sentences')) {
                const sentencesDiv = document.getElementById('sentences');
                sentencesDiv.classList.remove('show');
                setTimeout(() => {
                    sentencesDiv.style.display = 'none';
                }, 300);
            }
        });

        // 新增互動功能
        document.getElementById('centerCircle').addEventListener('click', () => {
            alert('🎄 聖誕寫作樹 🎄\n點擊周圍的彩燈查看不同主題的寫作範例！');
        });

        // 燈光切換功能
        let lightsOn = true;
        document.getElementById('lightsToggle').addEventListener('click', () => {
            const topics = document.querySelectorAll('.topic');
            const lines = document.querySelectorAll('.line');
            const star = document.querySelector('.star');
            
            if (lightsOn) {
                // 關閉燈光
                topics.forEach(topic => {
                    topic.style.animationPlayState = 'paused';
                    topic.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2)';
                });
                
                lines.forEach(line => {
                    line.style.animationPlayState = 'paused';
                    line.style.opacity = '0.2';
                });
                
                star.style.animationPlayState = 'paused';
                star.style.opacity = '0.5';
                
                document.getElementById('lightsToggle').textContent = '✨ 開啟燈光效果';
            } else {
                // 開啟燈光
                topics.forEach(topic => {
                    topic.style.animationPlayState = 'running';
                    topic.style.boxShadow = '';
                });
                
                lines.forEach(line => {
                    line.style.animationPlayState = 'running';
                    line.style.opacity = '1';
                });
                
                star.style.animationPlayState = 'running';
                star.style.opacity = '1';
                
                document.getElementById('lightsToggle').textContent = '✨ 切換燈光效果';
            }
            
            lightsOn = !lightsOn;
        });

        // 添加鍵盤快捷鍵
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const sentencesDiv = document.getElementById('sentences');
                if (sentencesDiv.style.display === 'block') {
                    sentencesDiv.classList.remove('show');
                    setTimeout(() => {
                        sentencesDiv.style.display = 'none';
                    }, 300);
                }
            }
        });

        // 確保頁面居中
        window.addEventListener('load', () => {
            document.body.style.justifyContent = 'flex-start';
        });

        // 視窗縮放時重新渲染
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const wrapper = document.getElementById('topicsWrapper');
                wrapper.innerHTML = '';
                const topics = [...new Set(data.map(x => x.category.trim()))];
                if (topics.length) renderTopics(topics);
            }, 200);
        });
    </script>
